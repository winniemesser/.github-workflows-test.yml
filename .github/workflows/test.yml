name: Telegram Test

on:
  workflow_dispatch:  # nur manuell starten

jobs:
  test_bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Python installieren
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Bot Test ausführen
        env:
          TOKEN: $8723958111:AAHmAE-l960x94B51sAywFusC0AnvyOrShQ
          CHAT_ID: $7354994362
        run: |
          python -c "import requests, os; requests.post(f'https://api.telegram.org/bot{os.getenv('TOKEN')}/sendMessage', json={'chat_id': os.getenv('CHAT_ID'),'text':'✅ Test erfolgreich!'})"
